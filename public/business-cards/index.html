<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Визитка Ритейл контракт</title>
  <style>
    body{margin:0;background:#050b1b;color:#fff;font-family:Arial,sans-serif;padding:38px}
    .wrap{max-width:1220px;margin:0 auto}
    h1{font-size:28px;margin:0 0 10px}
    p{color:#9fa9bd;margin:0 0 28px}
    .grid{display:grid;grid-template-columns:1fr;gap:28px}
    .card{border-radius:24px;overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,.38);background:#08132b}
    img{display:block;width:100%;height:auto}
    .label{font-weight:800;color:#e84c30;margin:0 0 10px;text-transform:uppercase;letter-spacing:1.2px}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Визитка «Ритейл контракт»</h1>
    <p>Формат 90×50 мм, масштаб SVG 1800×1000 px. Цвета и графика собраны в дизайн-коде лендинга.</p>
    <div class="grid">
      <section>
        <div class="label">Лицевая сторона</div>
        <div class="card"><img src="retail-contract-card-front.svg" alt="Лицевая сторона визитки"></div>
      </section>
      <section>
        <div class="label">Оборотная сторона</div>
        <div class="card"><img src="retail-contract-card-back.svg" alt="Оборотная сторона визитки"></div>
      </section>
    </div>
  </main>
</body>
</html>
